<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛行機レース</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Arial Black', sans-serif; }
        
        /* 🛠️ 操作パネルを横並びにするスタイル */
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            background: rgba(0,0,0,0.85); color: white; padding: 15px; border-radius: 8px;
            display: flex; gap: 10px; flex-wrap: wrap; max-width: 960px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .ship-config {
            background: rgba(255,255,255,0.05); padding: 10px; border-radius: 4px; width: 210px;
            border-bottom: none;
        }
        .ship-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #00ffcc; border-left: 4px solid #00ffcc; padding-left: 8px; display: flex; align-items: center; }
        .name-input { background: transparent; border: none; border-bottom: 1px dashed #00ffcc; color: #00ffcc; font-weight: bold; font-size: 13px; width: 120px; margin-left: 5px; outline: none; font-family: inherit; }
        .input-group { margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-size: 10px; width: 130px; color: #ddd; }
        .input-group input[type="number"] { width: 50px; background: #222; color: #fff; border: 1px solid #555; border-radius: 3px; padding: 2px; font-size: 11px; text-align: right; }
        
        /* ⏱️ タイム＆リザルト表示 */
        #info {
            position: absolute; bottom: 10px; left: 10px; color: white; font-size: 14px; text-shadow: 2px 2px 4px black; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; z-index: 200; min-width: 220px; border: 1px solid rgba(255,255,255,0.2); line-height: 1.6;
        }
        
        #showcaseUI { display: none; position: absolute; bottom: 100px; right: 50px; color: white; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 15px; border-right: 12px solid #ffd700; z-index: 400; min-width: 280px; box-shadow: -5px 5px 20px rgba(0,0,0,0.5); }
        #showcaseName { font-size: 28px; margin: 0; color: #ffd700; }
        #showcaseSpeed { font-size: 60px; margin: 0; font-family: 'Impact', sans-serif; }
        #countdownUI { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 180px; font-weight: bold; z-index: 350; text-shadow: 0 0 30px #000; }
        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 250; overflow: hidden; }
        .confetti { position: absolute; width: 12px; height: 12px; border-radius: 2px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(800px) rotate(720deg); opacity: 0; } }
        #restartBtn { display: none; width: 100%; padding: 8px; margin-top: 10px; background: #00ffcc; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: black; }

       /* 🏆 豪華な勝利画面のスタイル */
#winnerUI {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    background: rgba(0, 0, 0, 0); /* 背景は透明にして青空を活かす */
    z-index: 2000; 
    justify-content: center; 
    align-items: center; 
    flex-direction: column; 
    color: white; 
    text-align: center; 
}

#winnerCloseUp {
    width: 50%; 
    height: 50%; 
    margin-bottom: 20px; 
    position: relative; 
}

#winnerMessage {
    font-size: 60px; 
    margin-bottom: 10px; 
    animation: pulseMessage 2s ease-in-out infinite; 
    font-weight: bold;
    color: #ffd700; /* 🏆 文字全体を綺麗な金色（イエロー）にする */
    /* 青空でも文字がハッキリ浮き出るように黒い影をつけます */
    text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8); 
}

/* ⚠️ 不要になった古いグラデーション処理（#winnerText）は削除または無効化します */
#winnerText {
    background: none;
    -webkit-background-clip: unset;
    -webkit-text-fill-color: unset;
    display: inline;
}

#praiseMessage {
    font-size: 30px; 
    color: #00e5ff; /* 💎 サブタイトルを綺麗な水色に変更 */
    margin-bottom: 30px; 
    font-family: sans-serif; 
    /* 青空でも読みやすいように影を追加 */
    text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.8);
}
        #restartBtn_winner {
            background: #00ffcc; border: none; border-radius: 4px; padding: 15px 30px; font-size: 20px;
            font-weight: bold; cursor: pointer; color: black; box-shadow: 0 0 10px rgba(0,255,204,0.5);
        }
        @keyframes pulseMessage {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="ship-config">
        <div class="ship-title">🚀 <input type="text" id="name1" value="チーム あか" class="name-input"></div>
        <input type="file" id="upload1" accept=".glb,.gltf" style="width:100%; font-size:10px;"><br>
        <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_1" value="120"></div>
        <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_1" value="145"></div>
        <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight1" value="100"></div>
    </div>
    <div class="ship-config">
        <div class="ship-title">🛸 <input type="text" id="name2" value="チーム みどり" class="name-input"></div>
        <input type="file" id="upload2" accept=".glb,.gltf" style="width:100%; font-size:10px;"><br>
        <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_2" value="130"></div>
        <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_2" value="155"></div>
        <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight2" value="110"></div>
    </div>
    <div class="ship-config">
        <div class="ship-title">✈️ <input type="text" id="name3" value="チーム あお" class="name-input"></div>
        <input type="file" id="upload3" accept=".glb,.gltf" style="width:100%; font-size:10px;"><br>
        <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_3" value="115"></div>
        <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_3" value="135"></div>
        <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight3" value="85"></div>
    </div>
    <div class="ship-config">
        <div class="ship-title">✈️ <input type="text" id="name4" value="チーム きいろ" class="name-input"></div>
        <input type="file" id="upload4" accept=".glb,.gltf" style="width: 100%; font-size: 10px;"><br>
        <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_4" value="115"></div>
        <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_4" value="135"></div>
        <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight4" value="85"></div>
    </div>
</div>

<button id="startBtn" style="position: fixed; top: 20px; right: 20px; width: auto; z-index: 1000; padding: 10px 20px; font-size: 16px; background: linear-gradient(to bottom, #ffaa00, #ff8800); color: black; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">フライト開始 🏁</button>

<div id="showcaseUI"><p id="showcaseName"></p><p style="margin:0;font-size:12px;color:#ccc;">PERFORMANCE SPEED</p><p id="showcaseSpeed"></p></div>
<div id="countdownUI"></div>
<div id="confetti-container"></div>

<div id="winnerUI">
    <div id="winnerCloseUp"></div>
    <div id="winnerMessage"><span id="winnerText"></span> </div>
    <div id="praiseMessage">見事なフライトでした！</div>
    <button id="restartBtn_winner">RETRY 🔄</button>
</div>

<div id="info">
    ⏱️ TIME: <span id="timeTxt">0.00</span>s<br>
    <span id="infoName1">RED</span>: <span id="status1">READY</span><br>
    <span id="infoName2">GREEN</span>: <span id="status2">READY</span><br>
    <span id="infoName3">BLUE</span>: <span id="status3">READY</span><br>
    <span id="infoName4">YELLOW</span>: <span id="status4">READY</span><br>
    <button id="restartBtn">RETRY 🔄</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
let scene, camera, renderer, clouds = [];
let gameStarted = false, isShowcasing = false, isCountingDown = false;
let showcaseIndex = -1, showcaseStartTime = 0, countdownStartTime = 0, startTime = 0;
let elapsedTime = 0, winningShipId = null;
let tapeLeft, tapeRight, isTapeCut = false;
let ships = [
  { id: 1, name: "チーム あか", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0xff3333 },
  { id: 2, name: "チーム みどり", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0x33ff33 },
  { id: 3, name: "チーム あお", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0x3333ff },
  { id: 4, name: "チーム きいろ", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0xffff33 }
];
const finishLineX = 250, groundY = -8, laneWidth = 7;

function createFinishTexture() {
    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 128; const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 512, 128); ctx.fillStyle = '#000000'; const size = 32;
    for(let y=0; y<128; y+=size) {for(let x=0; x<512; x+=size) {if((x+y)/size % 2 === 0) ctx.fillRect(x, y, size, size);}}
    ctx.fillStyle = '#ffcc00'; ctx.fillRect(64, 20, 384, 88); ctx.strokeStyle = '#000000'; ctx.lineWidth = 4; ctx.strokeRect(64, 20, 384, 88);
    ctx.fillStyle = '#000000'; ctx.font = 'bold 64px Arial'; ctx.textAlign = 'center'; ctx.fillText('FINISH', 256, 85); return new THREE.CanvasTexture(canvas);
}

function init() {
    scene = new THREE.Scene(); scene.background = new THREE.Color(0x87CEEB); scene.fog = new THREE.Fog(0x87CEEB, 20, 220);
    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(window.innerWidth, window.innerHeight); document.body.appendChild(renderer.domElement);
    const ambLight = new THREE.AmbientLight(0xffffff, 0.9); scene.add(ambLight); const dirLight = new THREE.DirectionalLight(0xffffff, 0.7); dirLight.position.set(20, 50, 20); scene.add(dirLight);
    // --- 🛣️ 高精細な滑走路テクスチャの生成 ---
function createRunwayTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');

    // 1. ベースのアスファルト（ノイズ入りのダークグレー）
    ctx.fillStyle = '#55575c'; // ← ここを明るいグレーに変更しました
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // アスファルトのざらざら感を出すための微細なノイズ
    for (let i = 0; i < 5000; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = Math.random() * 2;
        ctx.fillStyle = Math.random() > 0.5 ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.15)';
        ctx.fillRect(x, y, size, size);
    }

    // 2. 両サイドのエッジライン（黄色）
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(0, 0, canvas.width, 15); // 上のエッジ
    ctx.fillRect(0, canvas.height - 15, canvas.width, 15); // 下のエッジ

    // 3. レース用のグリッド線・スタート枠（等間隔に配置）
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.lineWidth = 4;
    for (let x = 50; x < canvas.width; x += 150) {
        // 横断するグリッド線
        ctx.beginPath();
        ctx.moveTo(x, 15);
        ctx.lineTo(x, canvas.height - 15);
        ctx.stroke();
    }

    // 4. 中央の破線（センターライン）
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 8;
    ctx.setLineDash([40, 30]); // [線の長さ, 空白の長さ]
    ctx.beginPath();
    ctx.moveTo(0, canvas.height / 2);
    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
    ctx.setLineDash([]); // ダッシュ設定をリセット

    const texture = new THREE.CanvasTexture(canvas);
    // 横方向（飛行機が進む方向）にテクスチャを繰り返しループさせる設定
    texture.wrapS = THREE.RepeatWrapping;
    texture.repeat.set(10, 1); // 10回繰り返して細長く見せる
    return texture;
}

// 新しい滑走路の作成（マテリアルに生成したテクスチャを適用）
const runwayTex = createRunwayTexture();
const runwayMat = new THREE.MeshStandardMaterial({
    map: runwayTex,
    roughness: 0.8, // 反射を抑えてアスファルトっぽく
    metalness: 0.1
});

const runway = new THREE.Mesh(new THREE.PlaneGeometry(1000, 60), runwayMat); // 横幅をレーンに合わせ少しシャープに(100→60)
runway.rotation.x = -Math.PI / 2;
runway.position.set(400, groundY - 0.2, 0);
scene.add(runway);
// ----------------------------------------
    const gate = new THREE.Group(); const poleGeo = new THREE.CylinderGeometry(0.6, 0.6, 35, 12); const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
    const pL = new THREE.Mesh(poleGeo, poleMat); pL.position.set(0, 10, laneWidth * 3.5); gate.add(pL); const pR = new THREE.Mesh(poleGeo, poleMat); pR.position.set(0, 10, -laneWidth * 3.5); gate.add(pR);
    const boardGeo = new THREE.BoxGeometry(1.5, 8, laneWidth * 7.5); const boardMat = new THREE.MeshStandardMaterial({ map: createFinishTexture() }); const board = new THREE.Mesh(boardGeo, boardMat); board.position.set(0, 25, 0); gate.add(board); gate.position.set(finishLineX, groundY, 0); scene.add(gate);
    const tapeGeo = new THREE.BoxGeometry(0.1, 1.2, laneWidth * 3.5); const tapeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 }); tapeLeft = new THREE.Mesh(tapeGeo, tapeMat); tapeLeft.position.set(finishLineX, 0, laneWidth * 1.75); scene.add(tapeLeft); tapeRight = new THREE.Mesh(tapeGeo, tapeMat); tapeRight.position.set(finishLineX, 0, -laneWidth * 1.75); scene.add(tapeRight);
    for(let i=0; i<40; i++) createCloud(Math.random() * 600 - 100);
    document.getElementById('upload1').addEventListener('change', (e) => handleFileSelect(e, 0)); document.getElementById('upload2').addEventListener('change', (e) => handleFileSelect(e, 1)); document.getElementById('upload3').addEventListener('change', (e) => handleFileSelect(e, 2)); document.getElementById('upload4').addEventListener('change', (e) => handleFileSelect(e, 3));
    document.getElementById('startBtn').addEventListener('click', startShowcase); document.getElementById('restartBtn').addEventListener('click', resetGame); window.addEventListener('resize', onWindowResize);
    animate();
}

function createCloud(startX = 250) {
    const group = new THREE.Group(); const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
    for(let i=0; i<6; i++) {const part = new THREE.Mesh(new THREE.SphereGeometry(3 + Math.random() * 4, 8, 8), mat); part.position.set(i * 3, Math.random() * 3, Math.random() * 3); group.add(part);}
    group.position.set(startX, 15 + Math.random() * 40, Math.random() * 120 - 60); scene.add(group); clouds.push(group);
}

function handleFileSelect(event, index) {
    const reader = new FileReader(); reader.onload = (e) => { new THREE.GLTFLoader().parse(e.target.result, '', (gltf) => { if (ships[index].model) scene.remove(ships[index].model); ships[index].model = gltf.scene; const box = new THREE.Box3().setFromObject(gltf.scene); const scale = 6.0 / box.getSize(new THREE.Vector3()).length(); gltf.scene.scale.set(scale, scale, scale); gltf.scene.rotation.y = -Math.PI / 2; gltf.scene.position.set(-30, groundY, (index - 1) * laneWidth); scene.add(gltf.scene); }); }; reader.readAsArrayBuffer(event.target.files[0]);
}

function startShowcase() {
    isShowcasing = true;
    showcaseIndex = -1;
    showcaseStartTime = performance.now();
    
    // 💡 フライト開始ボタン（startBtn）を押した時だけ、UIとボタンを隠すようにします
    document.getElementById('ui').style.setProperty('display', 'none', 'important');
    document.getElementById('startBtn').style.setProperty('display', 'none', 'important');
    document.getElementById('showcaseUI').style.setProperty('display', 'block', 'important');
    
    ships.forEach((ship, i) => {
        ship.name = document.getElementById(`name${i+1}`).value || `SHIP ${i+1}`;
        document.getElementById(`infoName${i+1}`).innerText = ship.name;
        const v1 = parseFloat(document.getElementById(`v1_${i+1}`).value);
        const vr = parseFloat(document.getElementById(`vr_${i+1}`).value);
        const weight = parseFloat(document.getElementById(`weight${i+1}`).value);
        ship.displaySpeed = ((v1 + vr) * 2) / weight;
        ship.speed = ship.displaySpeed * 0.09;
        ship.vrRatio = (vr / 320);
        
        if (!ship.model) {
            ship.model = new THREE.Mesh(new THREE.ConeGeometry(2.5, 7, 4), new THREE.MeshStandardMaterial({ color: ship.color }));
            ship.model.rotation.z = -Math.PI/2;
            ship.model.position.set(-30, groundY, (i - 1) * laneWidth);
            scene.add(ship.model);
        }
    });
}

function spawnConfetti() {
    const colors = ['#ffd700', '#ff0000', '#00ff00', '#0000ff', '#ffffff', '#ff00ff']; const container = document.getElementById('confetti-container');
    for(let i=0; i<180; i++) { const c = document.createElement('div'); c.className = 'confetti'; c.style.left = Math.random() * 100 + '%'; c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; c.style.animationDuration = (Math.random() * 2 + 1) + 's'; c.style.animationDelay = (Math.random() * 0.5) + 's'; container.appendChild(c); }
}

function resetGame () {
 gameStarted = false ;
 isShowcasing = false ;
 isCountingDown = false ;
 winningShipId = null ;
 isTapeCut = false ;
 
 // UIの表示切り替え（フライト開始ボタンを確実に復活させる）
 document . getElementById ( 'ui' ) . style . display = 'flex' ;
 document . getElementById ( 'startBtn' ) . style . display = 'inline-block' ;
 document . getElementById ( 'winnerUI' ) . style . display = 'none' ;
 document . getElementById ( 'showcaseUI' ) . style . display = 'none' ;
 document . getElementById ( 'countdownUI' ) . style . display = 'none' ;
 document . getElementById ( 'confetti-container' ) . innerHTML = '' ;
 document . getElementById ( 'timeTxt' ) . innerText = '0.00' ;
    ships.forEach((ship, i) => { ship.currentSpeed = 0; ship.finished = false; if (ship.model) { ship.model.position.set(-30, groundY, (i - 1) * laneWidth); ship.model.rotation.set(0, -Math.PI / 2, 0); } document.getElementById(`status${ship.id}`).innerText = "READY"; document.getElementById(`status${ship.id}`).className = ""; });
    tapeLeft.position.set(finishLineX, 0, laneWidth * 1.75); tapeLeft.rotation.y = 0; tapeLeft.visible = true; tapeRight.position.set(finishLineX, 0, -laneWidth * 1.75); tapeRight.rotation.y = 0; tapeRight.visible = true; camera.position.set(-10, 2, 25); camera.lookAt(-30, groundY, 0);
}

// 🏆 勝利画面を表示する関数
let winnerRenderer, winnerScene, winnerCamera, winnerModel;
function showWinnerScreen(winnerShip) {
    document.getElementById('ui').style.display = 'none';
    
    // 💡 ここを以下のように「🎉」で挟む形に書き換えます！
    document.getElementById('winnerText').innerHTML = `🎉 ${winnerShip.name} が優勝！ 🎉`;
    
    // ❌ 未定義のエラー原因を避けるため、以下の行をコメントアウト（または削除）します
    // setupWinnerCloseUp(winnerShip); 
    
    document.getElementById('winnerUI').style.display = 'flex';
    
    document.getElementById('restartBtn_winner').onclick = () => {
        resetGame();
    };
}

// レース終了・リザルト画面を表示する関数（既存の関数内に組み込んでください）
function showResultScreen() {
    // 1. 画面を明るくするために、環境光（AmbientLight）やディレクショナルライトを強める
    // もし既存のライトがあれば、その intensity（強度）を上げます
    if (window.ambientLight) {
        // 💡 ここを 1.5 から 3.0 (または 4.0 など) に上げます
        window.ambientLight.intensity = 3.0; // 明るさを大幅アップ！
    } else {
        // 💡 こちらの 1.5 も 3.0 に変更します
        const brightLight = new THREE.AmbientLight(0xffffff, 3.0);
        scene.add(brightLight);
    }

    // スポットライトなどで勝った機体をさらに引き立てる場合
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    sunLight.position.set(5, 10, 7);
    scene.add(sunLight);

    // 2. 優勝した「チーム あお」の機体オブジェクトを取得
    //（※変数名は実際のコードに合わせて「bluePlane」などに変更してください）
    const winnerPlane = bluePlane; 

    if (winnerPlane) {
        // 3. カメラを「チーム あお」の機体の目の前に移動させてクローズアップ
        // 機体の位置をベースに、少し前方・上方にカメラを配置します
        camera.position.set(
            winnerPlane.position.x + 0,  // 左右中央
            winnerPlane.position.y + 2,  // 少し上から見下ろす
            winnerPlane.position.z + 8   // 機体の手前（正面側）
        );

        // カメラの視点をしっかり「チーム あお」の機体に向ける
        camera.lookAt(winnerPlane.position);
    }

    // 4. UI（「チーム あおが優勝！」の文字やボタン）を表示する
    document.getElementById('result-ui').style.display = 'block'; 
}

function animate() {
    requestAnimationFrame(animate); let now = performance.now(); let flowSpeed = gameStarted ? 0.9 : 0.1;
    clouds.forEach(c => { c.position.x -= flowSpeed; if(c.position.x < -200) c.position.x = 400; });
    
    // 勝利画面用の機体を回す
    if (winnerModel) { winnerModel.rotation.y += 0.015; winnerModel.position.y = Math.sin(now * 0.002) * 0.3; if (winnerRenderer && winnerScene && winnerCamera) { winnerRenderer.render(winnerScene, winnerCamera); } }

    if (isShowcasing) {
        let curIdx = Math.floor((now - showcaseStartTime) / 2500);
        if (curIdx !== showcaseIndex && curIdx < 4) { showcaseIndex = curIdx; let ship = ships[showcaseIndex]; camera.position.set(ship.model.position.x + 14, ship.model.position.y + 4, ship.model.position.z + 12); camera.lookAt(ship.model.position); document.getElementById('showcaseName').innerText = ship.name; document.getElementById('showcaseSpeed').innerText = ship.displaySpeed.toFixed(1); }
        else if (curIdx >= 4) { isShowcasing = false; isCountingDown = true; countdownStartTime = now; document.getElementById('showcaseUI').style.display = 'none'; document.getElementById('countdownUI').style.display = 'block'; }
    } else if (isCountingDown) {
        let count = 3 - Math.floor((now - countdownStartTime) / 1000); document.getElementById('countdownUI').innerText = count > 0 ? count : "START!"; camera.position.set(-50, 5, 30); camera.lookAt(0, 0, 0);
        if (count < -1) { isCountingDown = false; gameStarted = true; startTime = now; document.getElementById('countdownUI').style.display = 'none'; }
    } else if (gameStarted) {
        elapsedTime = (now - startTime) / 1000; document.getElementById('timeTxt').innerText = elapsedTime.toFixed(2); let leaderX = -100, allFin = true;
        ships.forEach(ship => {
            if (!ship.finished) {
                allFin = false; if (ship.currentSpeed < ship.speed) ship.currentSpeed += 0.01; ship.model.position.x += ship.currentSpeed;
                if (ship.currentSpeed > ship.speed * ship.vrRatio) { if (ship.model.position.y < ship.targetHeight) { ship.model.position.y += 0.18; ship.model.rotation.z = Math.min(ship.model.rotation.z + 0.01, 0.3); } else { ship.model.rotation.z = Math.max(ship.model.rotation.z - 0.01, 0); } }
                if (ship.model.position.x >= finishLineX) { ship.finished = true; ship.time = elapsedTime; document.getElementById(`status${ship.id}`).innerText = `GOAL (${elapsedTime.toFixed(2)}s)`; if (!winningShipId) { winningShipId = ship.id; isTapeCut = true; spawnConfetti(); } }
            }
            if(ship.model.position.x > leaderX) leaderX = ship.model.position.x;
        });
        camera.position.x = leaderX - 35; camera.position.y = 6; camera.lookAt(leaderX + 25, 0, 0);
        if (allFin) {
            gameStarted = false;
            let winnerShip = ships.reduce((min, ship) => ship.time < min.time ? ship : min, ships[0]);
            showWinnerScreen(winnerShip);
            document.getElementById('restartBtn').style.display = 'block';
        }
    }
    if (isTapeCut) { tapeLeft.position.x += 1.8; tapeLeft.position.z += 1.8; tapeLeft.rotation.y += 0.25; tapeRight.position.x += 1.8; tapeRight.position.z -= 1.8; tapeRight.rotation.y -= 0.25; if (tapeLeft.position.z > 60) { tapeLeft.visible = false; tapeRight.visible = false; } }
    else if (!gameStarted && !isShowcasing && !isCountingDown && !winningShipId) { camera.position.set(-15, 3, 30); camera.lookAt(-30, groundY, 0); }
    if(winningShipId && !gameStarted && !winnerModel) { let winShip = ships.find(s => s.id === winningShipId).model; winShip.rotation.x += 0.12; winShip.position.y += Math.sin(now * 0.01) * 0.12; }
    renderer.render(scene, camera);
}

function onWindowResize() { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); }
init();
</script>
