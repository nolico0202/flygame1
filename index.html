<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>飛行機レース</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Arial Black', sans-serif; }
        
        /* UI設定パネル */
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.85); padding: 12px; border-radius: 8px; z-index: 100; width: 260px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .ship-config { border-bottom: 1px solid #444; padding-bottom: 8px; margin-bottom: 8px; }
        .ship-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #00ffcc; border-left: 4px solid #00ffcc; padding-left: 8px; display: flex; align-items: center; }
        
        .name-input {
            background: transparent; border: none; border-bottom: 1px dashed #00ffcc;
            color: #00ffcc; font-weight: bold; font-size: 13px; width: 140px; margin-left: 5px; outline: none; font-family: inherit;
        }
        .name-input:focus { border-bottom: 1px solid #fff; color: #fff; }

        .input-group { margin-bottom: 4px; display: flex; align-items: center; justify-content: space-between; }
        .input-group label { font-size: 10px; width: 140px; color: #ddd; }
        .input-group input[type="number"] { width: 60px; background: #222; color: #fff; border: 1px solid #555; border-radius: 3px; padding: 2px; font-size: 11px; }
        
        #startBtn { 
            width: 100%; padding: 10px; margin-top: 5px; cursor: pointer; font-weight: bold; font-size: 14px; 
            background: linear-gradient(to bottom, #ffaa00, #ff8800); color: black; border: none; border-radius: 4px;
            transition: transform 0.1s;
        }
        #startBtn:active { transform: scale(0.95); }
        
        #info { position: absolute; bottom: 10px; left: 10px; color: white; font-size: 14px; text-shadow: 2px 2px 4px black; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 8px; z-index: 200; min-width: 220px; border: 1px solid rgba(255,255,255,0.2); }
        .rank-1 { color: #ffd700; font-weight: bold; }
        
        #centralWin {
            display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #ffd700; font-size: 120px; font-weight: bold; text-align: center;
            text-shadow: 0 0 20px #fff, 0 0 40px #ffd700, 0 0 80px #ff8800;
            z-index: 300; animation: win-glow 1s ease-in-out infinite alternate;
        }
        @keyframes win-glow { from { transform: translate(-50%, -50%) scale(1); opacity: 0.9; } to { transform: translate(-50%, -50%) scale(1.1); opacity: 1; } }

        #showcaseUI { display: none; position: absolute; bottom: 100px; right: 50px; color: white; background: rgba(0,0,0,0.85); padding: 20px; border-radius: 15px; border-right: 12px solid #ffd700; z-index: 400; min-width: 280px; box-shadow: -5px 5px 20px rgba(0,0,0,0.5); }
        #showcaseName { font-size: 28px; margin: 0; color: #ffd700; }
        #showcaseSpeed { font-size: 60px; margin: 0; font-family: 'Impact', sans-serif; }
        #countdownUI { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 180px; font-weight: bold; z-index: 350; text-shadow: 0 0 30px #000; }
        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 250; overflow: hidden; }
        .confetti { position: absolute; width: 12px; height: 12px; border-radius: 2px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(800px) rotate(720deg); opacity: 0; } }
        #restartBtn { display: none; width: 100%; padding: 8px; margin-top: 10px; background: #00ffcc; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="ship-config">
            <div class="ship-title">🚀 <input type="text" id="name1" value="チーム　あか" class="name-input"></div>
            <input type="file" id="upload1" accept=".glb,.gltf" style="width:100%; font-size:10px;"><br>
            <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_1" value="120"></div>
            <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_1" value="145"></div>
            <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight1" value="100"></div>
        </div>
        <div class="ship-config">
            <div class="ship-title">🛸 <input type="text" id="name2" value="チーム　みどり" class="name-input"></div>
            <input type="file" id="upload2" accept=".glb,.gltf" style="width:100%; font-size:10px;"><br>
            <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_2" value="130"></div>
            <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_2" value="155"></div>
            <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight2" value="110"></div>
        </div>
        <div class="ship-config">
            <div class="ship-title">✈️ <input type="text" id="name3" value="チーム　あお" class="name-input"></div>
            <input type="file" id="upload3" accept=".glb,.gltf" style="width:100%; font-size:10px;"><br>
            <div class="input-group"><label>離陸決定速度 (V1):</label><input type="number" id="v1_3" value="115"></div>
            <div class="input-group"><label>機首上げ速度 (VR):</label><input type="number" id="vr_3" value="135"></div>
            <div class="input-group"><label>機体重量 (トン):</label><input type="number" id="weight3" value="85"></div>
        </div>
        <div class="ship-config">
    <div class="ship-title">✈️ <input type="text" id="name4" value="チーム きいろ" class="name-input"></div>
    <input type="file" id="upload4" accept=".glb,.gltf" style="width: 100%; font-size: 10px;"><br>
    <div class="input-group">
        <label>離陸決定速度 (V1):</label>
        <input type="number" id="v1_4" value="115">
    </div>
    <div class="input-group">
        <label>機首上げ速度 (VR):</label>
        <input type="number" id="vr_4" value="135">
    </div>
    <div class="input-group">
        <label>機体重量 (トン):</label>
        <input type="number" id="weight4" value="85">
    </div>
</div>
        <button id="startBtn">フライト開始 🏁</button>
    </div>

    <div id="showcaseUI"><p id="showcaseName"></p><p style="margin:0;font-size:12px;color:#ccc;">PERFORMANCE SPEED</p><p id="showcaseSpeed"></p></div>
    <div id="countdownUI"></div>
    <div id="centralWin">🏆WIN!</div>
    <div id="confetti-container"></div>

    <div id="info">
        ⏱️ TIME: <span id="timeTxt">0.00</span>s<br>
        <span id="infoName1">RED</span>: <span id="status1">READY</span><br>
        <span id="infoName2">GREEN</span>: <span id="status2">READY</span><br>
        <span id="infoName3">BLUE</span>: <span id="status3">READY</span><br>
        <span id="infoName4">YELLOW</span>: <span id="status4">READY</span><br>
        <button id="restartBtn">RETRY 🔄</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, clouds = [];
        let gameStarted = false, isShowcasing = false, isCountingDown = false;
        let showcaseIndex = -1, showcaseStartTime = 0, countdownStartTime = 0, startTime = 0;
        let elapsedTime = 0, winningShipId = null;
        let tapeLeft, tapeRight, isTapeCut = false;

        let ships = [
            { id: 1, name: "チーム あか", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0xff3333 },
            { id: 2, name: "チーム　みどり", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0x33ff33 },
            { id: 3, name: "チーム　あお", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0x3333ff },
            { id: 4, name: "チーム きいろ", model: null, speed: 0, currentSpeed: 0, displaySpeed: 0, targetHeight: 0, vrRatio: 0, finished: false, color: 0xffff33 }
        ];

        const finishLineX = 250, groundY = -8, laneWidth = 7;

        function createFinishTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // 背景（チェッカーフラッグ柄）
            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 512, 128);
            ctx.fillStyle = '#000000';
            const size = 32;
            for(let y=0; y<128; y+=size) {
                for(let x=0; x<512; x+=size) {
                    if((x+y)/size % 2 === 0) ctx.fillRect(x, y, size, size);
                }
            }
            
            // 中央の黄色い帯
            ctx.fillStyle = '#ffcc00'; ctx.fillRect(64, 20, 384, 88);
            ctx.strokeStyle = '#000000'; ctx.lineWidth = 4; ctx.strokeRect(64, 20, 384, 88);

            // 文字
            ctx.fillStyle = '#000000'; ctx.font = 'bold 64px Arial'; ctx.textAlign = 'center';
            ctx.fillText('FINISH', 256, 85);
            
            return new THREE.CanvasTexture(canvas);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 220);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const ambLight = new THREE.AmbientLight(0xffffff, 0.9); scene.add(ambLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7); dirLight.position.set(20, 50, 20); scene.add(dirLight);

            // 【変更】道路の色を明るい灰色（0x999999）に変更
            const runway = new THREE.Mesh(new THREE.PlaneGeometry(1000, 100), new THREE.MeshStandardMaterial({ color: 0x999999 }));
            runway.rotation.x = -Math.PI / 2; runway.position.set(400, groundY - 0.2, 0); scene.add(runway);
            const line = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            line.rotation.x = -Math.PI / 2; line.position.set(400, groundY - 0.15, 0); scene.add(line);

            // 🏁 豪華なゴールゲート
            const gate = new THREE.Group();
            const poleGeo = new THREE.CylinderGeometry(0.6, 0.6, 35, 12);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
            
            const pL = new THREE.Mesh(poleGeo, poleMat); pL.position.set(0, 10, laneWidth * 3.5); gate.add(pL);
            const pR = new THREE.Mesh(poleGeo, poleMat); pR.position.set(0, 10, -laneWidth * 3.5); gate.add(pR);

            // メイン看板
            const boardGeo = new THREE.BoxGeometry(1.5, 8, laneWidth * 7.5);
            const boardMat = new THREE.MeshStandardMaterial({ map: createFinishTexture() });
            const board = new THREE.Mesh(boardGeo, boardMat);
            board.position.set(0, 25, 0); gate.add(board);

            gate.position.set(finishLineX, groundY, 0);
            scene.add(gate);

            // 🎗️ ゴールテープ
            const tapeGeo = new THREE.BoxGeometry(0.1, 1.2, laneWidth * 3.5);
            const tapeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            tapeLeft = new THREE.Mesh(tapeGeo, tapeMat); tapeLeft.position.set(finishLineX, 0, laneWidth * 1.75); scene.add(tapeLeft);
            tapeRight = new THREE.Mesh(tapeGeo, tapeMat); tapeRight.position.set(finishLineX, 0, -laneWidth * 1.75); scene.add(tapeRight);

            for(let i=0; i<40; i++) createCloud(Math.random() * 600 - 100);

            document.getElementById('upload1').addEventListener('change', (e) => handleFileSelect(e, 0));
            document.getElementById('upload2').addEventListener('change', (e) => handleFileSelect(e, 1));
            document.getElementById('upload3').addEventListener('change', (e) => handleFileSelect(e, 2));
            document.getElementById('upload4').addEventListener('change', (e) => handleFileSelect(e, 3));
            document.getElementById('startBtn').addEventListener('click', startShowcase);
            document.getElementById('restartBtn').addEventListener('click', resetGame);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createCloud(startX = 250) {
            const group = new THREE.Group();
            const mat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.7 });
            for(let i=0; i<6; i++) {
                const part = new THREE.Mesh(new THREE.SphereGeometry(3 + Math.random() * 4, 8, 8), mat);
                part.position.set(i * 3, Math.random() * 3, Math.random() * 3); group.add(part);
            }
            group.position.set(startX, 15 + Math.random() * 40, Math.random() * 120 - 60);
            scene.add(group); clouds.push(group);
        }

        function handleFileSelect(event, index) {
            const reader = new FileReader();
            reader.onload = (e) => {
                new THREE.GLTFLoader().parse(e.target.result, '', (gltf) => {
                    if (ships[index].model) scene.remove(ships[index].model);
                    ships[index].model = gltf.scene;
                    const box = new THREE.Box3().setFromObject(gltf.scene);
                    const scale = 6.0 / box.getSize(new THREE.Vector3()).length();
                    gltf.scene.scale.set(scale, scale, scale);
                    gltf.scene.rotation.y = -Math.PI / 2;
                    gltf.scene.position.set(-30, groundY, (index - 1) * laneWidth);
                    scene.add(gltf.scene);
                });
            };
            reader.readAsArrayBuffer(event.target.files[0]);
        }

        function startShowcase() {
            isShowcasing = true; showcaseIndex = -1; showcaseStartTime = performance.now();
            document.getElementById('ui').style.display = 'none';
            document.getElementById('showcaseUI').style.display = 'block';
            ships.forEach((ship, i) => {
                ship.name = document.getElementById(`name${i+1}`).value || `SHIP ${i+1}`;
                document.getElementById(`infoName${i+1}`).innerText = ship.name;
                const v1 = parseFloat(document.getElementById(`v1_${i+1}`).value);
                const vr = parseFloat(document.getElementById(`vr_${i+1}`).value);
                const weight = parseFloat(document.getElementById(`weight${i+1}`).value);
                ship.displaySpeed = ((v1 + vr) * 2) / weight;
                ship.speed = ship.displaySpeed * 0.09;
                ship.vrRatio = (vr / 320);
                if(!ship.model) {
                    ship.model = new THREE.Mesh(new THREE.ConeGeometry(2.5, 7, 4), new THREE.MeshStandardMaterial({ color: ship.color }));
                    ship.model.rotation.z = -Math.PI/2; ship.model.position.set(-30, groundY, (i - 1) * laneWidth); scene.add(ship.model);
                }
            });
        }

        function spawnConfetti() {
            const colors = ['#ffd700', '#ff0000', '#00ff00', '#0000ff', '#ffffff', '#ff00ff'];
            const container = document.getElementById('confetti-container');
            for(let i=0; i<180; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + '%';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDuration = (Math.random() * 2 + 1) + 's';
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                container.appendChild(c);
            }
        }

        function resetGame() {
            gameStarted = false; isShowcasing = false; isCountingDown = false; winningShipId = null; isTapeCut = false;
            document.getElementById('ui').style.display = 'block';
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('centralWin').style.display = 'none';
            document.getElementById('showcaseUI').style.display = 'none';
            document.getElementById('countdownUI').style.display = 'none';
            document.getElementById('confetti-container').innerHTML = '';
            document.getElementById('timeTxt').innerText = '0.00';
            ships.forEach((ship, i) => {
                ship.currentSpeed = 0; ship.finished = false;
                if (ship.model) { ship.model.position.set(-30, groundY, (i - 1) * laneWidth); ship.model.rotation.set(0, -Math.PI / 2, 0); }
                document.getElementById(`status${ship.id}`).innerText = "READY";
                document.getElementById(`status${ship.id}`).className = "";
            });
            tapeLeft.position.set(finishLineX, 0, laneWidth * 1.75); tapeLeft.rotation.y = 0; tapeLeft.visible = true;
            tapeRight.position.set(finishLineX, 0, -laneWidth * 1.75); tapeRight.rotation.y = 0; tapeRight.visible = true;
            camera.position.set(-10, 2, 25); camera.lookAt(-30, groundY, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            let now = performance.now();
            let flowSpeed = gameStarted ? 0.9 : 0.1;
            clouds.forEach(c => { c.position.x -= flowSpeed; if(c.position.x < -200) c.position.x = 400; });

            if (isShowcasing) {
                let curIdx = Math.floor((now - showcaseStartTime) / 2500);
                if (curIdx !== showcaseIndex && curIdx < 4) {
                    showcaseIndex = curIdx; let ship = ships[showcaseIndex];
                    camera.position.set(ship.model.position.x + 14, ship.model.position.y + 4, ship.model.position.z + 12);
                    camera.lookAt(ship.model.position);
                    document.getElementById('showcaseName').innerText = ship.name;
                    document.getElementById('showcaseSpeed').innerText = ship.displaySpeed.toFixed(1);
                } else if (curIdx >= 4) {
                    isShowcasing = false; isCountingDown = true; countdownStartTime = now;
                    document.getElementById('showcaseUI').style.display = 'none';
                    document.getElementById('countdownUI').style.display = 'block';
                }
            } else if (isCountingDown) {
                let count = 3 - Math.floor((now - countdownStartTime) / 1000);
                document.getElementById('countdownUI').innerText = count > 0 ? count : "START!";
                camera.position.set(-50, 5, 30); camera.lookAt(0, 0, 0);
                if (count < -1) { isCountingDown = false; gameStarted = true; startTime = now; document.getElementById('countdownUI').style.display = 'none'; }
            } else if (gameStarted) {
                elapsedTime = (now - startTime) / 1000;
                document.getElementById('timeTxt').innerText = elapsedTime.toFixed(2);
                let leaderX = -100, allFin = true;
                ships.forEach(ship => {
                    if (!ship.finished) {
                        allFin = false;
                        if(ship.currentSpeed < ship.speed) ship.currentSpeed += 0.01;
                        ship.model.position.x += ship.currentSpeed;
                        if(ship.currentSpeed > ship.speed * ship.vrRatio) {
                            if(ship.model.position.y < ship.targetHeight) {
                                ship.model.position.y += 0.18; ship.model.rotation.z = Math.min(ship.model.rotation.z + 0.01, 0.3);
                            } else {
                                ship.model.rotation.z = Math.max(ship.model.rotation.z - 0.01, 0);
                            }
                        }
                        if (ship.model.position.x >= finishLineX) {
                            ship.finished = true; ship.time = elapsedTime;
                            document.getElementById(`status${ship.id}`).innerText = `GOAL (${elapsedTime.toFixed(2)}s)`;
                            if (!winningShipId) { winningShipId = ship.id; isTapeCut = true; document.getElementById('centralWin').style.display = 'block'; spawnConfetti(); }
                        }
                    }
                    if(ship.model.position.x > leaderX) leaderX = ship.model.position.x;
                });
                camera.position.x = leaderX - 35; camera.position.y = 6; camera.lookAt(leaderX + 25, 0, 0);
                if(allFin) { gameStarted = false; document.getElementById('restartBtn').style.display = 'block'; }
            }
            
            if (isTapeCut) {
                tapeLeft.position.x += 1.8; tapeLeft.position.z += 1.8; tapeLeft.rotation.y += 0.25;
                tapeRight.position.x += 1.8; tapeRight.position.z -= 1.8; tapeRight.rotation.y -= 0.25;
                if (tapeLeft.position.z > 60) { tapeLeft.visible = false; tapeRight.visible = false; }
            } else if (!gameStarted && !isShowcasing && !isCountingDown && !winningShipId) {
                camera.position.set(-15, 3, 30); camera.lookAt(-30, groundY, 0);
            }

            if(winningShipId && !gameStarted) {
                let winShip = ships.find(s => s.id === winningShipId).model;
                winShip.rotation.x += 0.12; winShip.position.y += Math.sin(now * 0.01) * 0.12;
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
